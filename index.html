<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NWT Games — Newly Wed Times</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="confetti"></div>

<div class="wrap">

  <p class="eyebrow">You are cordially invited to play</p>
  <h1 class="masthead">NWT <span class="amp">Games</span></h1>
  <p class="subhead">The Newly Wed Times &nbsp;·&nbsp; Saturday, 12th September 2026</p>

  <hr class="rule">

  <div class="tile-grid">

    <a class="tile" href="wordle.html">
      <span class="seal" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 2h8v6l4 10a2 2 0 0 1-2 3H6a2 2 0 0 1-2-3l4-10V2Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          <path d="M6.5 14h11" stroke="currentColor" stroke-width="1.6"/>
          <path d="M8 2h8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </span>
      <h2>Wordle</h2>
      <p>Six rounds to raise the toast.</p>
      <span class="tag">5 letters</span>
    </a>

    <a class="tile" href="connections.html">
      <span class="seal" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="9" cy="12" r="5.5" stroke="currentColor" stroke-width="1.6"/>
          <circle cx="15" cy="12" r="5.5" stroke="currentColor" stroke-width="1.6"/>
        </svg>
      </span>
      <h2>Connections</h2>
      <p>Find what's tying the day together.</p>
      <span class="tag">4 groups</span>
    </a>

    <a class="tile" href="crossword.html">
      <span class="seal" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3.5" y="3.5" width="17" height="17" rx="1.5" stroke="currentColor" stroke-width="1.6"/>
          <path d="M3.5 9.5h17M3.5 15.5h17M9.5 3.5v17M15.5 3.5v17" stroke="currentColor" stroke-width="1.2" opacity="0.7"/>
        </svg>
      </span>
      <h2>Mini</h2>
      <p>A little crossword before the cake.</p>
      <span class="tag">5 × 5</span>
    </a>

  </div>

  <footer class="foot">with love, the Bennetts</footer>

</div>

<script src="confetti.js"></script>
</body>
</html>
